name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------------------------
  # The core check: compile and test VoidRunner's engine-agnostic simulation/content/replay core
  # on a plain .NET SDK — no Unity licence required. Because the sim is UnityEngine-free, "these
  # tests pass" means the deterministic game logic is correct on the CI machine.
  # ---------------------------------------------------------------------------------------------
  sim-tests:
    name: Sim core — build & test (.NET, no Unity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ci/HeadlessTests/HeadlessTests.csproj

      - name: Build
        run: dotnet build ci/HeadlessTests/HeadlessTests.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test ci/HeadlessTests/HeadlessTests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Build vrverify CLI
        run: dotnet build tools/VrVerify/VrVerify.csproj -c Release

      - name: End-to-end — record a replay against the shipped packs and verify it reproduces
        run: |
          BIN=tools/VrVerify/bin/Release/net8.0/vrverify.dll
          PACKS=Assets/StreamingAssets/ContentPacks
          dotnet "$BIN" info "$PACKS"
          dotnet "$BIN" record "$PACKS" CI-SEED 2400 /tmp/ci.vrplay
          dotnet "$BIN" verify "$PACKS" /tmp/ci.vrplay
          echo "Also verifying the committed sample replay:"
          dotnet "$BIN" verify "$PACKS" docs/samples/cosmic-drift.vrplay

  # ---------------------------------------------------------------------------------------------
  # Optional full Unity player build via GameCI. This needs a free Unity Personal licence supplied
  # as repo secrets (UNITY_EMAIL / UNITY_PASSWORD / UNITY_LICENSE). The job is skipped automatically
  # when the secret is absent, so forks and the default repo stay green without any paid/licensed
  # infrastructure. See docs/BUILDING.md for how to enable it.
  # ---------------------------------------------------------------------------------------------
  unity-build:
    name: Unity player build (optional, needs free licence secret)
    runs-on: ubuntu-latest
    needs: sim-tests
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Check for Unity licence secret
        id: gate
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No UNITY_LICENSE secret set — skipping the Unity build (this is expected and not a failure)."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-

      - name: Run EditMode tests in Unity
        if: steps.gate.outputs.enabled == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          unityVersion: 2022.3.40f1

      - name: Build Linux player
        if: steps.gate.outputs.enabled == 'true'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneLinux64
          unityVersion: 2022.3.40f1
          buildMethod: VoidRunner.EditorTools.BuildScript.BuildLinux

      - name: Upload player artifact
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: VoidRunner-Linux
          path: build
          if-no-files-found: ignore
